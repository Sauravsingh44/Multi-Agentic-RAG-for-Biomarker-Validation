services:
  - type: redis
    name: biogenix-redis
    ipAllowList: []
    plan: free

  - type: web
    name: biogenix-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn lung_cancer_api.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: lung_cancer_api.settings
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: biogenix-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: biogenix-redis
          property: connectionString
      - key: ALLOW_THREAD_PIPELINE_FALLBACK
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_REPO_ID
        sync: false

  - type: worker
    name: biogenix-celery-worker
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: celery -A lung_cancer_api worker --loglevel=info --concurrency=1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: lung_cancer_api.settings
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: biogenix-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: biogenix-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_REPO_ID
        sync: false
